name: PR Title Check

on:
  pull_request:
    types: [opened, edited]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title
            const valid = /^(feat|fix|chore|docs|refactor)\(.+\): .+$/.test(title)

            if (!valid) {
              core.setFailed(
                `Invalid PR title: "${title}"\nExpected format: feat(scope): description`
              )
            }